databases:
  - name: meal-planner-db
    databaseName: meal_planner
    user: meal_planner
    plan: free

services:
  - type: web
    name: meal-planner-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: meal-planner-db
          property: connectionString
      - key: MEAL_PLANNER_ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: meal-planner-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_API_URL
        sync: false
